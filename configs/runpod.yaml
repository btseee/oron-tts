# OronTTS F5-TTS RunPod Configuration
# Hardware target: NVIDIA A100/L40 (RunPod)

# == Audio ==================================================================
sample_rate: 24000
n_fft: 1024
hop_length: 256
win_length: 1024
n_mels: 100
fmin: 0.0
fmax: 8000.0

# == Logging ===============================================================
wandb_project: "oron-tts"
wandb_run_name: null    # auto-generated by wandb

# == Training ===============================================================
batch_size: 32
num_epochs: 500
learning_rate: 1.0e-4
betas: [0.9, 0.999]
warmup_steps: 2000
ema_decay: 0.9999
max_grad_norm: 1.0
grad_accumulation_steps: 1
num_workers: 8
prefetch_factor: 4
pin_memory: true
log_interval: 50
save_interval: 5
use_tqdm: false

# CUDA
cudnn_benchmark: true
use_tf32: true

# == Model (F5-TTS Base -- compatible with pretrained checkpoint) ===========
model:
  vocab_size: 65
  dim: 1024
  depth: 22
  heads: 16
  ff_mult: 4
  text_dim: 512
  conv_layers: 4
  p_dropout: 0.1
  vocos_dim: 512
  vocos_layers: 8
  vocos_intermediate: 1536

